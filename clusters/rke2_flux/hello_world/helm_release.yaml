apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hello-world
  namespace: hello-world
spec:
  releaseName: hello-world
  chart:
    spec:
      chart: ./charts/hello-world
      sourceRef:
        kind: GitRepository
        name: sikalabs
        namespace: hello-world
      version: "*"
  interval: 1m
  values:
    replicas: 2
