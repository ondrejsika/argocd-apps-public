apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openshift-logging-operator
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-97"
spec:
  project: system
  destination:
    namespace: openshift-logging
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - repoURL: https://github.com/ondrejsika/argocd-apps-public.git
      path: ./clusters/openshift_training/_system/openshift_logging_operator/manifests
