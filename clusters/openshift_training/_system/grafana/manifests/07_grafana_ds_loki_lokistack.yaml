apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki-lokistack
  namespace: grafana
spec:
  instanceSelector:
    matchLabels: {}
  datasource:
    name: Loki (lokistack)
    type: loki
    access: proxy
    url: https://loki-gateway-http.openshift-logging.svc:8080/api/logs/v1/application/
    jsonData:
      httpHeaderName1: Authorization
      tlsSkipVerify: true
    secureJsonData:
      httpHeaderValue1: Bearer ${token}
  valuesFrom:
    - targetPath: secureJsonData.httpHeaderValue1
      valueFrom:
        secretKeyRef:
          name: grafana-sa-token
          key: token
