apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: counter-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: counter-prod
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    - repoURL: https://gitlab.sikademo.com/bosch/bosch-example.git
      path: kubernetes/charts/counter
      helm:
        valueFiles:
          - ../../values/counter/common.values.yaml
          - ../../values/counter/prod.values.yaml
