apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: default-backend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: default-backend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://github.com/ondrejsika/argocd-apps-public.git
    targetRevision: HEAD
    path: clusters/bosch_rke2/_cluster/default_backend/manifests
