apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: hello
  namespace: hello
spec:
  interval: 1m0s
  subscriptions:
    - image:
        repoURL: ttl.sh/ondrejsikax/kcd2026-kargo-test
        allowTags: "^v[0-9]+"
        imageSelectionStrategy: NewestBuild
        discoveryLimit: 5
    - git:
        repoURL: git@github.com:ondrejsikax/kcd2026-kargo-test.git
        branch: master
        includePaths:
          - clusters/kargo2/hello/values/dev.common.values.yaml
