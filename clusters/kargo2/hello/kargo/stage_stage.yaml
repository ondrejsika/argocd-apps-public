apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: stage
  namespace: hello
  annotations:
    kargo.akuity.io/color: "#FFEB3B"
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: hello
      sources:
        stages:
          - dev
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: git@github.com:ondrejsikax/kcd2026-kargo-test.git
            checkout:
              - branch: master
                path: ./repo
        - uses: yaml-update
          config:
            path: ./repo/clusters/kargo2/hello/values/stage.values.yaml
            updates:
              - key: image
                value: ${{ imageFrom("ttl.sh/ondrejsikax/kcd2026-kargo-test").RepoURL + ":" + imageFrom("ttl.sh/ondrejsikax/kcd2026-kargo-test").Tag }}
        - uses: git-commit
          config:
            path: ./repo
            message: 'chore: promote hello:${{ imageFrom("ttl.sh/ondrejsikax/kcd2026-kargo-test").Tag }} to stage'
            author:
              name: SikaLabs[bot]
              email: sikalabsbot@sikalabs.com
        - uses: git-push
          config:
            path: ./repo
        - uses: argocd-update
          config:
            apps:
              - name: hello-stage
