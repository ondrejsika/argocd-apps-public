apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-example
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: cnpg-example
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://github.com/ondrejsika/argocd-apps-public.git
    targetRevision: HEAD
    path: clusters/kdev1/cnpg_example/manifests
