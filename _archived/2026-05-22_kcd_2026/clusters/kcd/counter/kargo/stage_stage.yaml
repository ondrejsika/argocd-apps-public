apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: stage
  namespace: counter
  annotations:
    kargo.akuity.io/color: "#FFEB3B"
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: counter
      sources:
        stages:
          - dev
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: git@github.com:ondrejsika/kcd2026-kargo-example.git
            checkout:
              - branch: master
                path: ./repo
        - uses: yaml-update
          config:
            path: ./repo/clusters/kcd/counter/values/stage/env.values.yaml
            updates:
              - key: backendImage
                value: ${{ imageFrom("ttl.sh/ondrejsika/kcd2026-kargo-example/backend").RepoURL + ":" + imageFrom("ttl.sh/ondrejsika/kcd2026-kargo-example/backend").Tag }}
              - key: frontendImage
                value: ${{ imageFrom("ttl.sh/ondrejsika/kcd2026-kargo-example/fronend").RepoURL + ":" + imageFrom("ttl.sh/ondrejsika/kcd2026-kargo-example/fronend").Tag }}
        - uses: git-commit
          config:
            path: ./repo
            message: 'chore(clusters/kcd/counter/values): promote counter backend:${{ imageFrom("ttl.sh/ondrejsika/kcd2026-kargo-example/backend").Tag }} frontend:${{ imageFrom("ttl.sh/ondrejsika/kcd2026-kargo-example/fronend").Tag }} image to stage'
            author:
              name: SikaLabs[bot]
              email: sikalabsbot@sikalabs.com
        - uses: copy
          config:
            inPath: ./repo/clusters/kcd/counter/values/dev/common.values.yaml
            outPath: ./repo/clusters/kcd/counter/values/stage/common.values.yaml
        - uses: git-commit
          config:
            path: ./repo
            message: 'chore(clusters/kcd/counter/values): promote counter values to stage'
            author:
              name: SikaLabs[bot]
              email: sikalabsbot@sikalabs.com
        - uses: git-push
          config:
            path: ./repo
        - uses: argocd-update
          config:
            apps:
              - name: counter-stage
