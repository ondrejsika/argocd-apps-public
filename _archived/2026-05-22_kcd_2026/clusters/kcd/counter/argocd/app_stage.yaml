apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: counter-stage
  namespace: argocd
  annotations:
    kargo.akuity.io/authorized-stage: "counter:stage"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
spec:
  project: default
  destination:
    namespace: counter-stage
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - repoURL: git@github.com:ondrejsika/kcd2026-kargo-example.git
      path: charts/counter
      targetRevision: master
      helm:
        valueFiles:
          - $values/clusters/kcd/counter/values/stage/env.values.yaml
          - $values/clusters/kcd/counter/values/stage/common.values.yaml
    - repoURL: git@github.com:ondrejsika/kcd2026-kargo-example.git
      targetRevision: master
      ref: values
