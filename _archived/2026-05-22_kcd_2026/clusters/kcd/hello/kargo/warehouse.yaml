apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: hello
  namespace: hello
spec:
  interval: 1m0s
  subscriptions:
    - image:
        repoURL: ttl.sh/ondrejsika/kcd2026-kargo-example/hello
        allowTags: "^v[0-9]+"
        imageSelectionStrategy: NewestBuild
        discoveryLimit: 5
    - git:
        repoURL: git@github.com:ondrejsika/kcd2026-kargo-example.git
        branch: master
        includePaths:
          - clusters/kcd/hello/values/dev/common.values.yaml
