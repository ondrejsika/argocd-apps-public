apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps-kcd2026-kargo-test
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
spec:
  project: default
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
  source:
    repoURL: git@github.com:ondrejsikax/kcd2026-kargo-test.git
    path: clusters/kargo2
    directory:
      recurse: true
      exclude: '{**/manifests/**,**/Chart.yaml,**/values.y*ml,**/*.values.y*ml,**/templates/**}'
